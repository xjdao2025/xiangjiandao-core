name: build-and-push-helm-chart-ghcr
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Chart tag (latest or v* version)'
        required: true
        default: 'latest'
        type: string

env:
  REGISTRY: ghcr.io
  USERNAME: ${{ github.actor }}
  PASSWORD: ${{ secrets.GITHUB_TOKEN }}
  CHART_NAME: xiangjiandao
  CHART_PATH: ./helm-chart/xiangjiandao

jobs:
  helm-chart-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ startsWith(inputs.tag, 'v') && inputs.tag || 'main' }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.USERNAME }}
          password: ${{ env.PASSWORD }}

      - name: Determine chart version
        id: version
        run: |
          if [[ "${{ inputs.tag }}" == latest ]]; then
            echo "CHART_VERSION=0.0.0-latest" >> $GITHUB_OUTPUT
          elif [[ "${{ inputs.tag }}" == v* ]]; then
            VERSION="${{ inputs.tag }}"
            echo "CHART_VERSION=${VERSION#v}" >> $GITHUB_OUTPUT
          else
            echo "CHART_VERSION=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Package and push Helm chart
        run: |
          CHART_VERSION="${{ steps.version.outputs.CHART_VERSION }}"
          
          # Update chart version
          yq e ".version = \"${CHART_VERSION}\"" -i ${{ env.CHART_PATH }}/Chart.yaml
          yq e ".appVersion = \"${CHART_VERSION}\"" -i ${{ env.CHART_PATH }}/Chart.yaml
          
          # Package chart
          helm package ${{ env.CHART_PATH }}
          
          # Push to OCI registry (ghcr.io)
          helm push ${{ env.CHART_NAME }}-${CHART_VERSION}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}
